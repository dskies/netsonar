<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#050f05"/>
  <!-- Sonar rings -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.25"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.45"/>
  <circle cx="16" cy="16" r="6"  fill="none" stroke="#00ff41" stroke-width="1" opacity="0.70"/>
  <!-- Crosshairs -->
  <line x1="16" y1="2"  x2="16" y2="30" stroke="#00ff41" stroke-width="0.6" opacity="0.30"/>
  <line x1="2"  y1="16" x2="30" y2="16" stroke="#00ff41" stroke-width="0.6" opacity="0.30"/>
  <!-- Sweep arc (active quadrant) -->
  <path d="M16 16 L16 2 A14 14 0 0 1 30 16 Z"
        fill="#00ff41" fill-opacity="0.08"
        stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#00ff41" opacity="0.95"/>
  <!-- Ping blip top-right quadrant -->
  <circle cx="23" cy="9" r="1.2" fill="#00ff88" opacity="0.85"/>
</svg>
